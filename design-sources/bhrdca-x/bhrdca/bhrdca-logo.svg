<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="BHRDCA crest">
  <defs>
    <path id="bhArcTop" d="M40,100 a60,60 0 0 1 120,0" fill="none"/>
    <path id="bhArcBot" d="M48,116 a52,52 0 0 0 104,0" fill="none"/>
  </defs>
  <!-- rings -->
  <circle cx="100" cy="100" r="98" fill="#f6c21c"/>
  <circle cx="100" cy="100" r="93" fill="#0a2242"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#f6c21c" stroke-width="3.5"/>
  <circle cx="100" cy="100" r="80" fill="#0e2b57"/>
  <!-- arced lettering -->
  <text font-family="'Bebas Neue',Arial,sans-serif" fill="#f6c21c" font-size="13.5" letter-spacing="2.2" text-anchor="middle" font-weight="700">
    <textPath href="#bhArcTop" startOffset="50%">BOX HILL REPORTER DISTRICT</textPath>
  </text>
  <text font-family="'Bebas Neue',Arial,sans-serif" fill="#f6c21c" font-size="10" letter-spacing="3" text-anchor="middle">
    <textPath href="#bhArcBot" startOffset="50%">EST. 1890</textPath>
  </text>
  <!-- crossed bats + ball emblem -->
  <g transform="translate(100,96)">
    <g stroke="#f6c21c" stroke-width="2.6" fill="#ffffff" stroke-linejoin="round">
      <g transform="rotate(32)">
        <rect x="-4.6" y="-34" width="9.2" height="40" rx="4"/>
        <rect x="-2.4" y="-42" width="4.8" height="10" rx="2.2" fill="#f6c21c" stroke="none"/>
      </g>
      <g transform="rotate(-32)">
        <rect x="-4.6" y="-34" width="9.2" height="40" rx="4"/>
        <rect x="-2.4" y="-42" width="4.8" height="10" rx="2.2" fill="#f6c21c" stroke="none"/>
      </g>
    </g>
    <circle cx="0" cy="16" r="8.5" fill="#c0392b" stroke="#ffffff" stroke-width="1.6"/>
    <path d="M-8.5,16 a8.5,8.5 0 0 1 17,0" fill="none" stroke="#ffffff" stroke-width="1.1" stroke-dasharray="1.6 1.8"/>
  </g>
  <!-- BHRDCA wordmark -->
  <text x="100" y="150" font-family="'Bebas Neue',Arial,sans-serif" fill="#ffffff" font-size="20" letter-spacing="1.5" text-anchor="middle">BHRDCA</text>
  <!-- laurel wreath -->
  <g fill="#f6c21c">
    <g id="bhLaurelL">
      <ellipse cx="52" cy="120" rx="5" ry="2.6" transform="rotate(-62 52 120)"/>
      <ellipse cx="55" cy="131" rx="5" ry="2.6" transform="rotate(-52 55 131)"/>
      <ellipse cx="61" cy="141" rx="5" ry="2.6" transform="rotate(-40 61 141)"/>
      <ellipse cx="70" cy="149" rx="5" ry="2.6" transform="rotate(-26 70 149)"/>
      <path d="M48,112 C50,126 58,140 72,150" fill="none" stroke="#f6c21c" stroke-width="2"/>
    </g>
    <use href="#bhLaurelL" transform="translate(200,0) scale(-1,1)"/>
    <circle cx="100" cy="163" r="3"/>
  </g>
</svg>
