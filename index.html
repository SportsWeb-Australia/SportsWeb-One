<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/sw1-icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SportsWeb One" />
    <title>SportsWeb One</title>
    <!-- Neutral platform defaults. Per-club title / description / OG / JSON-LD are
         injected client-side from the resolved club (src/lib/seo.ts). A per-host
         edge injection for non-JS scrapers is a separate, deferred ticket. -->
    <meta
      name="description"
      content="Community sports club websites, powered by SportsWeb One."
    />
    <meta property="og:site_name" content="SportsWeb One" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;600;700;800;900&family=Big+Shoulders+Display:wght@600;700;800&family=Fraunces:ital,wght@0,400;0,600;0,700;1,500&family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Newsreader:wght@400;500;600&family=Oswald:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700;800&family=Saira+Condensed:wght@500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"

    />

    <div id="root"></div>

  </body>
</html>
